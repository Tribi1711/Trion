<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TR OS - Asistente TRION</title>
<!-- MediaPipe Hands Library (detección invisible) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap');

  * {
    box-sizing: border-box;
    user-select: none;
  }

  body {
    margin: 0;
    overflow: hidden;
    font-family: 'JetBrains Mono', monospace;
    background: #000;
    color: #e8e8f0;
  }

  :root {
    --bg-deep: #0a0a0f;
    --bg-surface: #12121a;
    --bg-card: #1a1a26;
    --bg-hover: #22222f;
    --border: #2a2a3d;
    --border-bright: #3d3d5c;
    --accent: #7c6af7;
    --text-primary: #e8e8f0;
    --text-secondary: #888899;
    --text-dim: #555566;
    --green: #4ade80;
    --red: #f87171;
    --titlebar: #0e0e16;
    --font-mono: 'JetBrains Mono', monospace;
    --font-ui: 'Syne', sans-serif;
  }

  #standby {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.8s;
  }
  #standby.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .standby-logo {
    font-family: var(--font-ui);
    font-size: clamp(80px, 12vw, 160px);
    font-weight: 800;
    letter-spacing: -4px;
    color: #fff;
    opacity: 0.08;
  }

  #desktop {
    position: fixed;
    inset: 0;
    background: var(--bg-surface);
    display: flex;
    flex-direction: column;
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
  }
  #desktop.active {
    opacity: 1;
    pointer-events: all;
  }
  .os-titlebar {
    background: var(--titlebar);
    height: 36px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    justify-content: space-between;
  }
  .os-controls {
    display: flex;
    gap: 8px;
  }
  .os-btn {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
  }
  .os-btn.close { background: #ff5f57; }
  .os-btn.min { background: #febc2e; }
  .os-btn.max { background: #28c840; }
  .os-title {
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 3px;
    color: var(--text-secondary);
  }
  .desktop-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  .dock {
    width: 64px;
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 0;
    gap: 12px;
  }
  .dock-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--bg-hover);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: 0.2s;
    font-weight: 600;
    color: var(--text-primary);
  }
  .dock-icon:hover {
    transform: scale(1.1);
    border: 1px solid var(--accent);
    background: #2a2a3a;
  }
  .desktop-main {
    flex: 1;
    position: relative;
    background: var(--bg-surface);
    overflow: hidden;
  }
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.1;
    pointer-events: none;
  }
  #home-view {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .home-logo {
    font-family: var(--font-ui);
    font-size: 80px;
    font-weight: 800;
    opacity: 0.1;
  }

  .app-window {
    position: absolute;
    background: var(--bg-card);
    border: 1px solid var(--border-bright);
    border-radius: 12px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 320px;
    min-height: 260px;
    resize: both;
    z-index: 100;
  }
  .app-window.maximized {
    width: 100% !important;
    height: calc(100% - 36px - 24px) !important;
    top: 36px !important;
    left: 0 !important;
    border-radius: 0;
    resize: none;
  }
  .app-titlebar {
    height: 32px;
    background: var(--titlebar);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    cursor: grab;
  }
  .app-titlebar:active { cursor: grabbing; }
  .app-name {
    font-size: 10px;
    color: var(--text-secondary);
    flex: 1;
    text-align: center;
    letter-spacing: 2px;
    font-weight: 700;
  }
  .window-controls {
    display: flex;
    gap: 8px;
  }
  .win-btn {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    cursor: pointer;
  }
  .win-btn.close { background: #ff5f57; }
  .win-btn.minimize { background: #febc2e; }
  .win-btn.full { background: #28c840; }
  .app-body {
    flex: 1;
    background: var(--bg-deep);
    overflow: auto;
  }
  .app-body iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: #0f0f1a;
  }

  /* ASISTENTE MEJORADO */
  #assistant {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 360px;
    background: rgba(26, 26, 38, 0.98);
    backdrop-filter: blur(16px);
    border: 1px solid var(--accent);
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(124,106,247,0.4);
    z-index: 2000;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  #assistant.active {
    display: flex;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .assistant-header {
    background: linear-gradient(135deg, var(--accent), #5a4ac7);
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .assistant-title {
    font-family: var(--font-ui);
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 2px;
  }
  .assistant-close {
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
    opacity: 0.8;
    transition: 0.2s;
  }
  .assistant-close:hover { opacity: 1; }
  .assistant-messages {
    height: 280px;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .message {
    padding: 10px 14px;
    border-radius: 16px;
    max-width: 85%;
    font-size: 12px;
    line-height: 1.4;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .message.user {
    background: var(--accent);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .message.assistant {
    background: var(--bg-hover);
    color: var(--text-primary);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    border-left: 3px solid var(--accent);
  }
  .assistant-input-area {
    display: flex;
    padding: 12px;
    gap: 8px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.3);
  }
  .assistant-input {
    flex: 1;
    background: var(--bg-deep);
    border: 1px solid var(--border);
    color: white;
    padding: 8px 12px;
    border-radius: 25px;
    font-size: 12px;
    font-family: var(--font-mono);
  }
  .assistant-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .assistant-send, .assistant-voice {
    background: var(--accent);
    border: none;
    padding: 8px 16px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.2s;
  }
  .assistant-voice {
    background: var(--green);
    color: #000;
    font-weight: bold;
  }
  .assistant-send:hover, .assistant-voice:hover {
    transform: scale(1.05);
  }
  .listening-indicator {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--green);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2001;
    animation: pulseGlow 1s infinite;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(74,222,128,0.6);
  }
  .listening-indicator.active {
    display: flex;
  }
  @keyframes pulseGlow {
    0%, 100% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 20px rgba(74,222,128,0.6); }
    50% { transform: scale(1.15); opacity: 1; box-shadow: 0 0 40px rgba(74,222,128,0.9); }
  }

  #settings-panel {
    position: absolute;
    bottom: 40px;
    right: 10px;
    width: 260px;
    background: var(--bg-card);
    border: 1px solid var(--border-bright);
    border-radius: 10px;
    padding: 16px;
    display: none;
    z-index: 1000;
  }
  #settings-panel.open { display: block; }
  .settings-title {
    font-size: 11px;
    font-weight: 800;
    margin-bottom: 12px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .settings-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 10px;
  }
  input[type=range] { width: 100%; accent-color: var(--accent); }
  .statusbar {
    height: 24px;
    background: var(--titlebar);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 15px;
    font-size: 9px;
    color: var(--text-dim);
  }
  #clap-flash {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 99999;
    transition: opacity 0.05s;
  }
  #clap-flash.flash { opacity: 0.2; }
  button {
    background: var(--accent);
    border: none;
    padding: 5px 10px;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    font-size: 11px;
  }
  .calendar-event {
    background: #2a2a3d;
    margin-bottom: 8px;
    padding: 6px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
</style>
</head>
<body>
<div id="clap-flash"></div>
<div id="standby">
  <div class="standby-logo">TR OS</div>
</div>

<div id="desktop">
  <div class="os-titlebar">
    <div class="os-controls">
      <button class="os-btn close" onclick="shutdownOS()"></button>
      <button class="os-btn min"></button>
      <button class="os-btn max"></button>
    </div>
    <div class="os-title">TR OS</div>
    <div id="os-clock" style="font-size: 11px;">00:00</div>
  </div>
  <div class="desktop-body">
    <div class="dock">
      <div class="dock-icon" onclick="createAppWindow('home')">⌂</div>
      <div class="dock-icon" onclick="createAppWindow('trion')">TR</div>
      <div class="dock-icon" onclick="createAppWindow('trlava')">TL</div>
      <div class="dock-icon" onclick="createAppWindow('calendar')">📅</div>
      <div class="dock-icon" onclick="createAppWindow('notes')">📝</div>
      <div class="dock-icon" onclick="createAppWindow('calc')">⚇</div>
      <div class="dock-icon" onclick="toggleSettings()">⚙</div>
      <div class="dock-icon" onclick="toggleAssistant()">🎙️</div>
    </div>
    <div class="desktop-main" id="desktop-main">
      <div class="grid-bg"></div>
      <div id="home-view">
        <div class="home-logo">TR OS</div>
        <div style="font-size: 10px; letter-spacing: 5px;">SISTEMA ACTIVO</div>
      </div>
      <div id="settings-panel">
        <div class="settings-title">Sensibilidad gestos</div>
        <div class="settings-row"><span>Umbral:</span><span id="thresh-val">0.25</span></div>
        <input type="range" min="0.10" max="0.45" step="0.01" value="0.25" id="thresh-slider" oninput="updateThresh(this.value)">
        <button onclick="shutdownOS()" style="width:100%; margin-top:12px; background:var(--red);">Apagar sistema</button>
      </div>
    </div>
  </div>
  <div class="statusbar"><span>TR OS v3.0 | Asistente TRION (voz natural)</span><span style="margin-left:auto;">TRIBI EDITION</span></div>
</div>

<div id="assistant">
  <div class="assistant-header">
    <span class="assistant-title">✨ TRION ASSISTANT ✨</span>
    <span class="assistant-close" onclick="toggleAssistant()">✖</span>
  </div>
  <div class="assistant-messages" id="assistant-messages">
    <div class="message assistant">Hola, soy TRIBI. Puedes hablarme diciendo "Hola TRIBI" o usando el micrófono. 🎤</div>
  </div>
  <div class="assistant-input-area">
    <input type="text" class="assistant-input" id="assistant-input" placeholder="Escribe un comando..." onkeypress="if(event.key==='Enter') sendCommand()">
    <button class="assistant-send" onclick="sendCommand()">📤</button>
    <button class="assistant-voice" id="voice-btn" onclick="startVoiceRecognition()">🎤 VOZ</button>
  </div>
</div>
<div id="listening-indicator" class="listening-indicator" onclick="stopListening()">🔴 ESCUCHANDO</div>

<script>
  // ---------- DETECCIÓN DE MANOS INVISIBLE ----------
  const OS_STATE = {
    active: false,
    handThreshold: parseFloat(localStorage.getItem('tros_hand_thresh') || '0.25'),
    openDetected: false,
    awaitingClose: false,
    lastGestureTime: 0,
    gestureWindow: 1500
  };

  let windowsZIndex = 100;
  let windowsList = [];
  let recognition = null;
  let isListening = false;

  function updateClock() {
    const d = new Date();
    document.getElementById('os-clock').textContent = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }
  setInterval(updateClock, 1000); updateClock();

  function countExtendedFingers(landmarks) {
    let count = 0;
    const thumbTip = landmarks[4], thumbBase = landmarks[2], wrist = landmarks[0], indexBase = landmarks[5];
    if (thumbTip && thumbBase) {
      const handDir = (indexBase.x - wrist.x) > 0;
      if (handDir ? thumbTip.x > thumbBase.x + 0.03 : thumbTip.x < thumbBase.x - 0.03) count++;
    }
    if (landmarks[8] && landmarks[6] && landmarks[8].y < landmarks[6].y - 0.02) count++;
    if (landmarks[12] && landmarks[10] && landmarks[12].y < landmarks[10].y - 0.02) count++;
    if (landmarks[16] && landmarks[14] && landmarks[16].y < landmarks[14].y - 0.02) count++;
    if (landmarks[20] && landmarks[18] && landmarks[20].y < landmarks[18].y - 0.02) count++;
    return count;
  }

  function getGesture(landmarks) {
    const extended = countExtendedFingers(landmarks);
    if (extended >= 4) return 'OPEN';
    if (extended <= 1) return 'CLOSED';
    return 'PARTIAL';
  }

  let lastGestureCall = 0;
  function processGesture(gesture) {
    const now = Date.now();
    if (!OS_STATE.active) {
      if (gesture === 'OPEN' && !OS_STATE.openDetected) {
        OS_STATE.openDetected = true;
        OS_STATE.awaitingClose = true;
        OS_STATE.lastGestureTime = now;
      } 
      else if (gesture === 'CLOSED' && OS_STATE.awaitingClose && OS_STATE.openDetected && (now - OS_STATE.lastGestureTime) < OS_STATE.gestureWindow) {
        triggerUnlock();
      } 
      else if (gesture !== 'CLOSED' && OS_STATE.awaitingClose && (now - OS_STATE.lastGestureTime) > OS_STATE.gestureWindow) {
        OS_STATE.openDetected = false;
        OS_STATE.awaitingClose = false;
      }
    } else {
      if (gesture === 'OPEN' && !OS_STATE.openDetected) {
        OS_STATE.openDetected = true;
        OS_STATE.awaitingClose = true;
        OS_STATE.lastGestureTime = now;
      } 
      else if (gesture === 'CLOSED' && OS_STATE.awaitingClose && OS_STATE.openDetected && (now - OS_STATE.lastGestureTime) < OS_STATE.gestureWindow) {
        triggerShutdown();
      } 
      else if (OS_STATE.awaitingClose && (now - OS_STATE.lastGestureTime) > OS_STATE.gestureWindow) {
        OS_STATE.openDetected = false;
        OS_STATE.awaitingClose = false;
      }
    }
  }

  function triggerUnlock() {
    const flash = document.getElementById('clap-flash');
    flash.classList.add('flash');
    setTimeout(() => flash.classList.remove('flash'), 120);
    bootOS();
  }

  function triggerShutdown() {
    const flash = document.getElementById('clap-flash');
    flash.classList.add('flash');
    setTimeout(() => flash.classList.remove('flash'), 120);
    shutdownOS();
  }

  function bootOS() {
    OS_STATE.active = true;
    document.getElementById('standby').classList.add('hidden');
    document.getElementById('desktop').classList.add('active');
    OS_STATE.openDetected = false;
    OS_STATE.awaitingClose = false;
  }

  function shutdownOS() {
    OS_STATE.active = false;
    document.getElementById('desktop').classList.remove('active');
    document.getElementById('standby').classList.remove('hidden');
    OS_STATE.openDetected = false;
    OS_STATE.awaitingClose = false;
    windowsList.forEach(w => { if (w && w.windowDiv) w.windowDiv.remove(); });
    windowsList = [];
  }

  function updateThresh(val) { 
    OS_STATE.handThreshold = parseFloat(val); 
    localStorage.setItem('tros_hand_thresh', val); 
    document.getElementById('thresh-val').innerText = val; 
  }
  
  function toggleSettings() { 
    document.getElementById('settings-panel').classList.toggle('open'); 
  }

  // Hand tracking invisible
  async function initInvisibleHandTracking() {
    try {
      const hiddenVideo = document.createElement('video');
      hiddenVideo.setAttribute('autoplay', '');
      hiddenVideo.setAttribute('playsinline', '');
      hiddenVideo.setAttribute('muted', '');
      hiddenVideo.style.position = 'fixed';
      hiddenVideo.style.top = '-9999px';
      hiddenVideo.style.left = '-9999px';
      hiddenVideo.style.width = '1px';
      hiddenVideo.style.height = '1px';
      hiddenVideo.style.opacity = '0';
      document.body.appendChild(hiddenVideo);
      
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      hiddenVideo.srcObject = stream;
      await hiddenVideo.play();
      
      const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
      hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
      
      hands.onResults((results) => {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
          const landmarks = results.multiHandLandmarks[0];
          const gesture = getGesture(landmarks);
          const now = Date.now();
          if (now - lastGestureCall > 80) {
            processGesture(gesture);
            lastGestureCall = now;
          }
        }
      });
      
      const processFrame = async () => {
        if (hiddenVideo.readyState >= 2) await hands.send({ image: hiddenVideo });
        requestAnimationFrame(processFrame);
      };
      processFrame();
    } catch (err) { console.error("Error cámara:", err); }
  }
  initInvisibleHandTracking();

  // ---------- ASISTENTE TRION CON VOZ NATURAL ----------
  function addMessage(text, sender) {
    const container = document.getElementById('assistant-messages');
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${sender}`;
    msgDiv.textContent = text;
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
  }

  function speakNatural(text) {
    if (!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'es-ES';
    utterance.rate = 0.9;
    utterance.pitch = 1.0;
    utterance.volume = 1;
    
    // Intentar cargar una voz natural femenina (Google o la mejor disponible)
    let voices = speechSynthesis.getVoices();
    if (voices.length === 0) {
      speechSynthesis.onvoiceschanged = () => {
        voices = speechSynthesis.getVoices();
        setBestVoice(utterance, voices);
        speechSynthesis.speak(utterance);
      };
    } else {
      setBestVoice(utterance, voices);
      speechSynthesis.speak(utterance);
    }
  }
  
  function setBestVoice(utterance, voices) {
    // Buscar voces naturales: Google UK English Female, Spanish Female, etc.
    const preferred = voices.find(v => v.name.includes('Google UK') && v.lang === 'en-GB') ||
                      voices.find(v => v.name.includes('Google') && v.lang.startsWith('es')) ||
                      voices.find(v => v.lang === 'es-ES' && v.name.includes('Female')) ||
                      voices.find(v => v.lang === 'es-ES') ||
                      voices.find(v => v.lang.startsWith('es')) ||
                      voices.find(v => v.name.includes('Premium')) ||
                      voices[0];
    if (preferred) utterance.voice = preferred;
  }

  function processCommand(command) {
    const lower = command.toLowerCase().trim();
    addMessage(command, 'user');
    
    if (lower.includes('calculadora') || lower.includes('calculador')) {
      createAppWindow('calc');
      const resp = "Abriendo calculadora";
      addMessage(resp, 'assistant');
      speakNatural(resp);
    }
    else if (lower.includes('notas') || lower.includes('bloc')) {
      createAppWindow('notes');
      const resp = "Abriendo bloc de notas";
      addMessage(resp, 'assistant');
      speakNatural(resp);
    }
    else if (lower.includes('calendario') || lower.includes('tareas') || lower.includes('eventos')) {
      createAppWindow('calendar');
      const resp = "Abriendo calendario de tareas";
      addMessage(resp, 'assistant');
      speakNatural(resp);
    }
    else if (lower.includes('ia') && (lower.includes('app') || lower.includes('aplicación') || lower === 'ia')) {
      createAppWindow('trion');
      const resp = "Abriendo aplicación TRION";
      addMessage(resp, 'assistant');
      speakNatural(resp);
    }
    else if (lower.includes('trlava')) {
      createAppWindow('trlava');
      const resp = "Abriendo TRLAVA";
      addMessage(resp, 'assistant');
      speakNatural(resp);
    }
    else if (lower.includes('inicio') || lower.includes('home')) {
      createAppWindow('home');
      const resp = "Mostrando pantalla de inicio";
      addMessage(resp, 'assistant');
      speakNatural(resp);
    }
    else if (lower.includes('cerrar todas') || lower.includes('cerrar todo')) {
      windowsList.forEach(w => { if (w && w.windowDiv) w.windowDiv.remove(); });
      windowsList = [];
      const resp = "He cerrado todas las ventanas";
      addMessage(resp, 'assistant');
      speakNatural(resp);
    }
    else if (lower.includes('cerrar ventana') || (lower.includes('cerrar') && windowsList.length > 0)) {
      if (windowsList.length > 0) {
        const lastWin = windowsList[windowsList.length - 1];
        lastWin.windowDiv.remove();
        windowsList.pop();
        const resp = "Ventana cerrada";
        addMessage(resp, 'assistant');
        speakNatural(resp);
      } else {
        const resp = "No hay ventanas abiertas";
        addMessage(resp, 'assistant');
        speakNatural(resp);
      }
    }
    else if (lower.includes('apagar') || lower.includes('shutdown') || lower.includes('apagar sistema')) {
      const resp = "Apagando el sistema";
      addMessage(resp, 'assistant');
      speakNatural(resp);
      setTimeout(() => shutdownOS(), 1500);
    }
    else if (lower.includes('hora') || lower.includes('qué hora') || lower.includes('que hora')) {
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes().toString().padStart(2,'0');
      const resp = `Son las ${hours} con ${minutes} minutos`;
      addMessage(resp, 'assistant');
      speakNatural(resp);
    }
    else if (lower.includes('hola trion') || lower.includes('trion hola') || (lower.includes('tribi') && lower.length < 10)) {
      const resp = "Hola, soy TRION. Puedo abrir aplicaciones como calculadora, notas, calendario, TRION y TRLAVA. También puedo cerrar ventanas, decir la hora o apagar el sistema. ¿Qué necesitas?";
      addMessage(resp, 'assistant');
      speakNatural(resp);
    }
    else {
      const resp = "No entendí ese comando. Puedes decir: abre calculadora, abre notas, abre calendario, abre trion, cierra ventanas, qué hora es, o apagar sistema.";
      addMessage(resp, 'assistant');
      speakNatural(resp);
    }
  }

  function sendCommand() {
    const input = document.getElementById('assistant-input');
    const cmd = input.value.trim();
    if (cmd) {
      processCommand(cmd);
      input.value = '';
    }
  }

  function startVoiceRecognition() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      addMessage("Tu navegador no soporta reconocimiento de voz. Usa Chrome, Edge o Safari.", 'assistant');
      speakNatural("Lo siento, tu navegador no soporta reconocimiento de voz.");
      return;
    }
    
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'es-ES';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    
    const indicator = document.getElementById('listening-indicator');
    indicator.classList.add('active');
    isListening = true;
    
    recognition.onstart = () => {
      addMessage("🎧 Escuchando...", 'assistant');
    };
    
    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      indicator.classList.remove('active');
      isListening = false;
      processCommand(transcript);
    };
    
    recognition.onerror = (event) => {
      console.error("Error voz:", event.error);
      indicator.classList.remove('active');
      isListening = false;
      let errorMsg = "No te escuché correctamente. ";
      if (event.error === 'not-allowed') errorMsg = "Permiso denegado para usar el micrófono. ";
      addMessage(errorMsg + "Intenta escribir el comando.", 'assistant');
      speakNatural(errorMsg + "Intenta escribir el comando.");
    };
    
    recognition.onend = () => {
      indicator.classList.remove('active');
      isListening = false;
    };
    
    recognition.start();
    
    setTimeout(() => {
      if (isListening && recognition) {
        recognition.stop();
        indicator.classList.remove('active');
        isListening = false;
      }
    }, 10000);
  }
  
  function stopListening() {
    if (recognition && isListening) {
      recognition.stop();
      document.getElementById('listening-indicator').classList.remove('active');
      isListening = false;
    }
  }

  function toggleAssistant() {
    const assistant = document.getElementById('assistant');
    assistant.classList.toggle('active');
  }

  // Activación por voz continua (detectar "hola trion")
  function initAlwaysOnVoice() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) return;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const continuousRec = new SpeechRecognition();
    continuousRec.lang = 'es-ES';
    continuousRec.continuous = true;
    continuousRec.interimResults = true;
    
    continuousRec.onresult = (event) => {
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript.toLowerCase();
        if (transcript.includes('hola trivi') || transcript.includes('trivi hola') || transcript.includes('trivi')) {
          if (!document.getElementById('assistant').classList.contains('active')) {
            toggleAssistant();
          }
          addMessage("¡Hola! ¿En qué puedo ayudarte?", 'assistant');
          speakNatural("Hola, soy TRION. ¿Qué necesitas?");
          break;
        }
      }
    };
    continuousRec.start();
  }

  // Ventanas
  function createAppWindow(appId) {
    const existing = windowsList.find(w => w.id === appId);
    if (existing) { bringToFront(existing.windowDiv); return; }
    let contentHTML = '', windowTitle = '';
    if (appId === 'trion') {
      windowTitle = 'TRION';
      contentHTML = `<iframe srcdoc='<!DOCTYPE html><html><head><style>body{margin:0;background:linear-gradient(135deg,#0a0a1a,#1a0a2a);color:#00ffcc;display:flex;justify-content:center;align-items:center;height:100vh;font-family:monospace;}.container{text-align:center;border:2px solid #00ffcc;border-radius:20px;padding:20px;background:rgba(0,0,0,0.7);}h1{font-size:48px;}button{background:#00ffcc;padding:12px 24px;margin-top:20px;cursor:pointer;border:none;}</style></head><body><div class="container"><h1>TRION v2.0</h1><div>Secure Core Active</div><button onclick="alert('TRION activado')">INICIAR</button></div></body></html>'></iframe>`;
    } else if (appId === 'trlava') {
      windowTitle = 'TRLAVA';
      contentHTML = `<iframe srcdoc='<!DOCTYPE html><html><head><style>body{margin:0;overflow:hidden;}</style></head><body><canvas id="c"></canvas><script>const c=document.getElementById("c"),ctx=c.getContext("2d");c.width=innerWidth;c.height=innerHeight;let t=0;function draw(){const w=c.width,h=c.height,img=ctx.getImageData(0,0,w,h),d=img.data;for(let i=0;i<w;i++)for(let j=0;j<h;j++){const v=Math.sin(i*0.02+t)*Math.cos(j*0.02+t*0.5);const idx=(j*w+i)*4;d[idx]=128+127*Math.sin(v*3);d[idx+1]=100+155*Math.cos(v*2+2);d[idx+2]=200+55*Math.sin(v*4);d[idx+3]=255;}ctx.putImageData(img,0,0);t+=0.03;requestAnimationFrame(draw);}draw();window.onresize=()=>{c.width=innerWidth;c.height=innerHeight;};<\/script></body></html>'></iframe>`;
    } else if (appId === 'calendar') {
      windowTitle = 'CALENDARIO';
      contentHTML = `<div style="padding:15px"><h3>📅 Tareas</h3><input id="et" placeholder="Título" style="width:100%;padding:6px;margin-bottom:8px;background:#2a2a3d;border:1px solid #3d3d5c;color:white;"><input id="ed" type="date" style="width:100%;padding:6px;margin-bottom:8px;background:#2a2a3d;border:1px solid #3d3d5c;color:white;"><button id="add" style="width:100%;margin-bottom:15px;">➕ Añadir</button><div id="list"></div><script>function load(){let e=JSON.parse(localStorage.getItem("tr_calendar")||"[]");document.getElementById("list").innerHTML=e.map((x,i)=>'<div class="calendar-event"><span><strong>'+x.title+'</strong> ('+x.date+')</span><button onclick="deleteE('+i+')">✖</button></div>').join("");}window.deleteE=function(i){let e=JSON.parse(localStorage.getItem("tr_calendar")||"[]");e.splice(i,1);localStorage.setItem("tr_calendar",JSON.stringify(e));load();};document.getElementById("add")?.addEventListener("click",()=>{let t=document.getElementById("et").value,d=document.getElementById("ed").value;if(t&&d){let e=JSON.parse(localStorage.getItem("tr_calendar")||"[]");e.push({title:t,date:d});localStorage.setItem("tr_calendar",JSON.stringify(e));load();document.getElementById("et").value="";}});load();<\/script></div>`;
    } else if (appId === 'notes') {
      windowTitle = 'NOTAS';
      contentHTML = `<textarea id="na" style="width:100%;height:100%;background:#12121a;color:white;border:none;padding:12px;"></textarea><script>const ta=document.getElementById("na");ta.value=localStorage.getItem("tr_notes")||"";ta.addEventListener("input",()=>localStorage.setItem("tr_notes",ta.value));<\/script>`;
    } else if (appId === 'calc') {
      windowTitle = 'CALCULADORA';
      contentHTML = `<div style="padding:12px"><input id="ci" style="width:100%;background:#222;color:#fff;border:1px solid #3d3d5c;padding:8px;margin-bottom:10px;"><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">${'789/456*123-0.=C'.split('').map(c=>`<button onclick="if(this.innerText=='=')try{document.getElementById('ci').value=eval(document.getElementById('ci').value)}catch(e){}else if(this.innerText=='C')document.getElementById('ci').value='';else document.getElementById('ci').value+=this.innerText">${c}</button>`).join('')}</div></div>`;
    } else if (appId === 'home') {
      windowTitle = 'INICIO';
      contentHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:28px;opacity:0.4;">TR DESKTOP</div>`;
    }
    const winDiv = document.createElement('div');
    winDiv.className = 'app-window';
    winDiv.style.width = '560px';
    winDiv.style.height = '460px';
    winDiv.style.left = `${80 + windowsList.length * 35}px`;
    winDiv.style.top = `${70 + windowsList.length * 30}px`;
    winDiv.style.zIndex = windowsZIndex++;
    winDiv.innerHTML = `<div class="app-titlebar"><div class="app-name">${windowTitle}</div><div class="window-controls"><div class="win-btn minimize" onclick="minimizeWindow(this)"></div><div class="win-btn full" onclick="toggleMaximize(this)"></div><div class="win-btn close" onclick="closeWindow(this)"></div></div></div><div class="app-body">${contentHTML}</div>`;
    document.getElementById('desktop-main').appendChild(winDiv);
    windowsList.push({ id: appId, windowDiv: winDiv });
    makeDraggable(winDiv);
    return winDiv;
  }
  
  function bringToFront(win) { win.style.zIndex = windowsZIndex++; }
  function closeWindow(btn) { const win = btn.closest('.app-window'); const idx = windowsList.findIndex(w=>w.windowDiv===win); if(idx!==-1) windowsList.splice(idx,1); win.remove(); }
  function minimizeWindow(btn) { const win = btn.closest('.app-window'); win.style.display = win.style.display === 'none' ? 'flex' : 'none'; }
  function toggleMaximize(btn) { const win = btn.closest('.app-window'); if(win.classList.contains('maximized')){ win.classList.remove('maximized'); win.style.width='560px'; win.style.height='460px'; } else { win.classList.add('maximized'); win.style.width=''; win.style.height=''; } }
  function makeDraggable(el) {
    const bar = el.querySelector('.app-titlebar');
    let pos1=0,pos2=0,pos3=0,pos4=0;
    bar.onmousedown = dragMouseDown;
    function dragMouseDown(e) { e.preventDefault(); pos3 = e.clientX; pos4 = e.clientY; document.onmouseup = closeDrag; document.onmousemove = elementDrag; bringToFront(el); }
    function elementDrag(e) { e.preventDefault(); pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY; pos3 = e.clientX; pos4 = e.clientY; if(!el.classList.contains('maximized')){ el.style.top = (el.offsetTop - pos2) + "px"; el.style.left = (el.offsetLeft - pos1) + "px"; } }
    function closeDrag() { document.onmouseup = null; document.onmousemove = null; }
  }
  
  window.shutdownOS = shutdownOS;
  window.toggleSettings = toggleSettings;
  window.updateThresh = updateThresh;
  window.createAppWindow = createAppWindow;
  window.closeWindow = closeWindow;
  window.minimizeWindow = minimizeWindow;
  window.toggleMaximize = toggleMaximize;
  window.toggleAssistant = toggleAssistant;
  window.sendCommand = sendCommand;
  window.startVoiceRecognition = startVoiceRecognition;
  window.stopListening = stopListening;
  
  // Inicializar
  setTimeout(() => initAlwaysOnVoice(), 1000);
</script>
</body>
</html>
